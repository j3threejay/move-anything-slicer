name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build via Docker
        run: ./scripts/build.sh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/slicer-module.tar.gz
